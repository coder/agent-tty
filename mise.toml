[tools]
actionlint = "1.7.12"
communique = "1.1.3"
zizmor = "1.24.1"
# Live-demo-only recorder tools are pinned inside src/tools/hero-demo.ts so ordinary CI stays credential- and recorder-tool-free.
# CI installs [tools] with `mise install --locked`; update mise.lock whenever tool versions or supported CI platforms change.
node = "26"
python = "3"
aube = "1.10.4"

[tasks.bootstrap]
description = "Install deps and Chromium for local development"
run = "aube exec playwright install chromium"

[tasks.bootstrap-ci]
description = "Install deps for CI without browser downloads"
run = "aube ci"

[tasks.clean]
description = "Clean artifacts"
run = "npm run clean"

[tasks.build]
description = "Build"
run = "npm run build"
sources = [
  "src/**/*.ts",
  "tsconfig.json",
  "tsconfig.build.json",
  "package.json",
]
outputs = ["dist/**/*.js", "dist/**/*.d.ts", "dist/**/*.map"]

[tasks.install-smoke]
description = "Validate the tarball route and check the current git-install caveat"
run = "npm run smoke:install -- --skip-build"

[tasks."demo:agent-uses-agent-tty"]
description = "Regenerate the real-agent Hero Demo proof bundle"
run = "npx tsx src/tools/hero-demo.ts"

[tasks.validate-bundles]
description = "Validate canonical proof bundles against the canonical schema"
run = "npm run validate-bundle:canonical"
sources = [
  "dogfood/CATALOG.md",
  "dogfood/20260326-week9-release-readiness/**",
  "dogfood/20260325-week8-contract-locks/**",
  "dogfood/run-command/**",
  "dogfood/agent-uses-agent-tty/**",
  "src/tools/validate-bundle.ts",
  "src/tools/validate-canonical-bundles.ts",
  "src/tools/bundleManifestSchema.ts",
]

[tasks.typecheck]
description = "Typecheck"
run = "npm run typecheck"
sources = [
  "src/**/*.ts",
  "test/**/*.ts",
  "tsconfig.json",
  "tsconfig.build.json",
  "vitest.config.ts",
  "package.json",
]

[tasks.lint]
description = "Lint"
run = "npm run lint"
sources = [
  "src/**/*.ts",
  "test/**/*.ts",
  ".oxlintrc.json",
  "tsconfig.json",
  "vitest.config.ts",
  "package.json",
]

[tasks.format]
description = "Format"
run = "npm run format"

[tasks.format-check]
description = "Check format"
run = "npm run format:check"
sources = [
  "src/**/*.ts",
  "test/**/*.ts",
  ".oxfmtrc.json",
  "*.json",
  "mise.lock",
  "*.mjs",
  "*.toml",
  "*.md",
  "design/**/*.md",
]

[tasks.workflow-lint]
description = "Lint GitHub Actions workflows"
run = "actionlint && zizmor --offline ."
sources = [
  ".github/workflows/**/*.yml",
  ".github/workflows/**/*.yaml",
  "zizmor.yml",
]

[tasks.test]
description = "Test"
run = "npm run test"
sources = ["src/**/*.ts", "test/**/*.ts", "vitest.config.ts", "package.json"]

[tasks.test-unit]
description = "Run unit tests"
run = "npm run test:unit"
sources = [
  "src/**/*.ts",
  "test/unit/**/*.ts",
  "vitest.config.ts",
  "package.json",
]

[tasks.test-integration]
description = "Run integration tests serially"
run = "npm run test:integration"
sources = [
  "src/**/*.ts",
  "test/integration/**/*.ts",
  "vitest.config.ts",
  "package.json",
]

[tasks.test-e2e]
description = "Run e2e tests serially"
run = "npm run test:e2e"
sources = [
  "src/**/*.ts",
  "test/e2e/**/*.ts",
  "test/fixtures/**/*.ts",
  "vitest.config.ts",
  "package.json",
]

[tasks.ci]
description = "Run CI checks"
run = "mise run format-check && mise run workflow-lint && mise run lint && mise run typecheck && mise run test && mise run build && mise run install-smoke"
