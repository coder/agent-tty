name: CI

# Keep this workflow hand-curated. `mise generate github-action` is useful as a
# starting point, but this checked-in file is the maintained source of truth so
# repo-specific triggers, deterministic bootstrap, and step-level logs stay
# explicit.
on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3

      - name: Install CI dependencies
        run: mise run bootstrap-ci

      - name: Check formatting
        run: mise run format-check

      - name: Lint
        run: mise run lint

      - name: Typecheck
        run: mise run typecheck

      - name: Test
        run: mise run test

      - name: Build
        run: mise run build
